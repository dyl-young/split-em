name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "uat/v*"
      - "prod/v*"

jobs:
  supabase-deploy:
    name: Deploy Supabase
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'qa' || startsWith(github.ref, 'refs/tags/uat/') && 'uat' || 'production' }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8

      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm supabase:deploy
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-branch:
    name: Deploy Branch
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Push to deployment branch
        run: |
          if [[ "$GITHUB_REF" == refs/tags/uat/* ]]; then
            BRANCH=uat
          elif [[ "$GITHUB_REF" == refs/tags/prod/* ]]; then
            BRANCH=prod
          fi
          git branch --force "$BRANCH" "$GITHUB_SHA"
          git push --force origin "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
